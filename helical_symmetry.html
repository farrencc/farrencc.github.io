<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helical Symmetry Visualization</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #root {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Babel Standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Your React Component -->
    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        function HelicalSymmetryDemo() {
          const containerRef = useRef(null);
          const [isAnimating, setIsAnimating] = useState(true);
          const [showTransformed, setShowTransformed] = useState(true);
          const [viewMode, setViewMode] = useState('external');
          const sceneRef = useRef(null);
          const cameraRef = useRef(null);
          const rendererRef = useRef(null);
          const animationIdRef = useRef(null);

          useEffect(() => {
            if (!containerRef.current) return;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            sceneRef.current = scene;

            const camera = new THREE.PerspectiveCamera(
              75,
              containerRef.current.clientWidth / containerRef.current.clientHeight,
              0.1,
              1000
            );
            camera.position.set(10, 4, 10);
            camera.lookAt(0, 0, 0);
            cameraRef.current = camera;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
            containerRef.current.appendChild(renderer.domElement);
            rendererRef.current = renderer;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight1.position.set(5, 10, 5);
            scene.add(directionalLight1);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-5, -10, -5);
            scene.add(directionalLight2);

            const axesHelper = new THREE.AxesHelper(6);
            scene.add(axesHelper);

            const gridHelper = new THREE.GridHelper(12, 12, 0x444444, 0x222222);
            gridHelper.rotation.x = Math.PI / 2;
            gridHelper.position.z = -6;
            scene.add(gridHelper);

            const helixRadius = 2.5;
            const helixHeight = 16;
            const pitch = 1.5;
            const turns = helixHeight / pitch;
            const helixPoints = [];
            
            for (let i = 0; i <= turns * 100; i++) {
              const theta = (i / 100) * 2 * Math.PI;
              const z = (i / 100) * pitch - helixHeight / 2;
              const x = helixRadius * Math.cos(theta);
              const y = helixRadius * Math.sin(theta);
              helixPoints.push(new THREE.Vector3(x, y, z));
            }

            const helixGeometry = new THREE.BufferGeometry().setFromPoints(helixPoints);
            const helixMaterial = new THREE.LineBasicMaterial({ 
              color: 0x00ddff,
              transparent: true,
              opacity: 0.9
            });
            const helix = new THREE.Line(helixGeometry, helixMaterial);
            scene.add(helix);

            const tubeRadius = 0.08;
            const helixCurve = new THREE.CatmullRomCurve3(helixPoints);
            const tubeGeometry = new THREE.TubeGeometry(helixCurve, 500, tubeRadius, 8, false);
            const tubeMaterial = new THREE.MeshPhongMaterial({ 
              color: 0x00ddff,
              transparent: true,
              opacity: 0.4,
              emissive: 0x004455,
              emissiveIntensity: 0.2
            });
            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            scene.add(tube);

            const zAxisGeometry = new THREE.CylinderGeometry(0.04, 0.04, helixHeight, 32);
            const zAxisMaterial = new THREE.MeshPhongMaterial({ 
              color: 0x666666,
              transparent: true,
              opacity: 0.2
            });
            const zAxis = new THREE.Mesh(zAxisGeometry, zAxisMaterial);
            zAxis.rotation.x = Math.PI / 2;
            scene.add(zAxis);

            const particleGeometry = new THREE.SphereGeometry(0.2, 32, 32);
            const particleMaterial = new THREE.MeshPhongMaterial({ 
              color: 0xff3333,
              emissive: 0xff0000,
              emissiveIntensity: 0.4,
              shininess: 100
            });
            const particle = new THREE.Mesh(particleGeometry, particleMaterial);
            scene.add(particle);

            const transformedParticleGeometry = new THREE.SphereGeometry(0.2, 32, 32);
            const transformedParticleMaterial = new THREE.MeshPhongMaterial({ 
              color: 0x33ff33,
              emissive: 0x00ff00,
              emissiveIntensity: 0.4,
              transparent: true,
              opacity: 0.85,
              shininess: 100
            });
            const transformedParticle = new THREE.Mesh(transformedParticleGeometry, transformedParticleMaterial);
            scene.add(transformedParticle);

            const arrowHelper = new THREE.ArrowHelper(
              new THREE.Vector3(0, 0, 1),
              new THREE.Vector3(0, 0, 0),
              1,
              0xffff00,
              0.4,
              0.3
            );
            scene.add(arrowHelper);

            let time = 0;
            const k = 2 * Math.PI / pitch;
            const epsilon = 0.9;

            function animate() {
              animationIdRef.current = requestAnimationFrame(animate);

              if (isAnimating) {
                time += 0.008;
              }

              const theta = time;
              const z = (theta / (2 * Math.PI)) * pitch;
              const x = helixRadius * Math.cos(theta);
              const y = helixRadius * Math.sin(theta);
              
              const zOffset = -2;
              particle.position.set(x, y, z + zOffset);

              const originalPos = new THREE.Vector3(x, y, z + zOffset);
              const zCrossR = new THREE.Vector3(-y, x, 0);
              const zHat = new THREE.Vector3(0, 0, 1);
              const transformVector = zHat.clone().add(zCrossR.clone().multiplyScalar(k)).multiplyScalar(epsilon);
              
              const transformedPos = originalPos.clone().add(transformVector);
              transformedParticle.position.copy(transformedPos);
              transformedParticle.visible = showTransformed;

              arrowHelper.position.copy(originalPos);
              const arrowDir = transformVector.clone().normalize();
              arrowHelper.setDirection(arrowDir);
              arrowHelper.setLength(transformVector.length(), 0.4, 0.3);
              arrowHelper.visible = showTransformed;

              if (viewMode === 'particle') {
                camera.position.set(helixRadius, 0, 0);
                camera.lookAt(0, 0, 0);
                scene.rotation.z = -theta;
                scene.position.z = -(z + zOffset);
              } else {
                scene.rotation.z = 0;
                scene.position.z = 0;
                
                const cameraRadius = 15;
                const cameraSpeed = 0.0004;
                const cameraAngle = time * cameraSpeed;
                camera.position.x = cameraRadius * Math.cos(cameraAngle);
                camera.position.z = cameraRadius * Math.sin(cameraAngle);
                camera.position.y = 3 + 4 * Math.sin(cameraAngle * 0.3);
                camera.lookAt(0, 0, 0);
              }

              renderer.render(scene, camera);
            }

            animate();

            function handleResize() {
              if (!containerRef.current) return;
              camera.aspect = containerRef.current.clientWidth / containerRef.current.clientHeight;
              camera.updateProjectionMatrix();
              renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
            }
            window.addEventListener('resize', handleResize);

            return () => {
              window.removeEventListener('resize', handleResize);
              if (animationIdRef.current) {
                cancelAnimationFrame(animationIdRef.current);
              }
              if (containerRef.current && renderer.domElement) {
                containerRef.current.removeChild(renderer.domElement);
              }
              renderer.dispose();
            };
          }, [isAnimating, showTransformed, viewMode]);

          return (
            <div style={{ width: '100%', height: '100vh', display: 'flex', flexDirection: 'column', background: '#000' }}>
              <div ref={containerRef} style={{ flex: 1, position: 'relative' }}>
                <div style={{
                  position: 'absolute',
                  top: '20px',
                  right: '20px',
                  display: 'flex',
                  gap: '10px',
                  flexDirection: 'column',
                  zIndex: 10
                }}>
                  <button
                    onClick={() => setIsAnimating(!isAnimating)}
                    style={{
                      padding: '12px 18px',
                      fontSize: '14px',
                      background: 'rgba(0, 0, 0, 0.75)',
                      color: 'white',
                      border: '1px solid rgba(255, 255, 255, 0.3)',
                      borderRadius: '4px',
                      cursor: 'pointer',
                      fontWeight: '500',
                      transition: 'all 0.2s',
                      backdropFilter: 'blur(10px)',
                      fontFamily: 'system-ui, -apple-system, sans-serif'
                    }}
                    onMouseEnter={(e) => e.target.style.background = 'rgba(0, 0, 0, 0.9)'}
                    onMouseLeave={(e) => e.target.style.background = 'rgba(0, 0, 0, 0.75)'}
                  >
                    {isAnimating ? '⏸ Pause' : '▶ Play'}
                  </button>
                  
                  <button
                    onClick={() => setShowTransformed(!showTransformed)}
                    style={{
                      padding: '12px 18px',
                      fontSize: '14px',
                      background: 'rgba(0, 0, 0, 0.75)',
                      color: 'white',
                      border: '1px solid rgba(255, 255, 255, 0.3)',
                      borderRadius: '4px',
                      cursor: 'pointer',
                      fontWeight: '500',
                      transition: 'all 0.2s',
                      backdropFilter: 'blur(10px)',
                      fontFamily: 'system-ui, -apple-system, sans-serif'
                    }}
                    onMouseEnter={(e) => e.target.style.background = 'rgba(0, 0, 0, 0.9)'}
                    onMouseLeave={(e) => e.target.style.background = 'rgba(0, 0, 0, 0.75)'}
                  >
                    {showTransformed ? 'Tangent On' : 'Tangent Off'}
                  </button>
                  
                  <button
                    onClick={() => setViewMode(viewMode === 'external' ? 'particle' : 'external')}
                    style={{
                      padding: '12px 18px',
                      fontSize: '14px',
                      background: viewMode === 'particle' ? 'rgba(255, 200, 0, 0.35)' : 'rgba(0, 0, 0, 0.75)',
                      color: 'white',
                      border: viewMode === 'particle' ? '1px solid rgba(255, 200, 0, 0.6)' : '1px solid rgba(255, 255, 255, 0.3)',
                      borderRadius: '4px',
                      cursor: 'pointer',
                      fontWeight: '500',
                      transition: 'all 0.2s',
                      backdropFilter: 'blur(10px)',
                      fontFamily: 'system-ui, -apple-system, sans-serif'
                    }}
                    onMouseEnter={(e) => {
                      e.target.style.background = viewMode === 'particle' ? 'rgba(255, 200, 0, 0.5)' : 'rgba(0, 0, 0, 0.9)';
                    }}
                    onMouseLeave={(e) => {
                      e.target.style.background = viewMode === 'particle' ? 'rgba(255, 200, 0, 0.35)' : 'rgba(0, 0, 0, 0.75)';
                    }}
                  >
                    {viewMode === 'particle' ? 'Particle Frame' : 'Lab Frame'}
                  </button>
                </div>

                {viewMode === 'particle' && (
                  <div style={{
                    position: 'absolute',
                    bottom: '20px',
                    left: '50%',
                    transform: 'translateX(-50%)',
                    background: 'rgba(255, 200, 0, 0.15)',
                    padding: '12px 24px',
                    borderRadius: '6px',
                    color: 'rgba(255, 255, 255, 0.95)',
                    fontSize: '13px',
                    fontWeight: '500',
                    backdropFilter: 'blur(10px)',
                    border: '1px solid rgba(255, 200, 0, 0.3)',
                    fontFamily: 'system-ui, -apple-system, sans-serif',
                    letterSpacing: '0.3px'
                  }}>
                    Co-rotating, Co-translating Frame: Helix appears stationary
                  </div>
                )}
              </div>
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HelicalSymmetryDemo />);
    </script>
</body>
</html>
